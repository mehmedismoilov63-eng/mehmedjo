<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <title>GHOST Mini App</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">G</div>
        <div class="brand-copy">
          <strong>GHOST</strong>
          <span id="user-label">Mini App</span>
        </div>
      </div>

      <div class="top-actions">
        <button id="btn-refresh" class="icon-btn" type="button" aria-label="Holatni yangilash" title="Holatni yangilash">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.2 6.5M3 12A9 9 0 0 1 18.2 5.5"/><path d="M21 4v6h-6M3 20v-6h6"/></svg>
        </button>
        <button id="btn-clear" class="icon-btn" type="button" aria-label="Tarixni tozalash" title="Tarixni tozalash">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5M14 11v5"/></svg>
        </button>
        <div id="agent-badge" class="status-pill offline" role="status">
          <span></span>
          <b id="badge-label">offline</b>
        </div>
      </div>
    </header>

    <section class="system-strip" aria-label="Tizim holati">
      <div class="metric">
        <span>CPU</span>
        <strong id="metric-cpu">--</strong>
      </div>
      <div class="metric">
        <span>RAM</span>
        <strong id="metric-ram">--</strong>
      </div>
      <div class="metric">
        <span>Battery</span>
        <strong id="metric-battery">--</strong>
      </div>
      <div class="metric wide">
        <span>Agent</span>
        <strong id="metric-agent">kutilmoqda</strong>
      </div>
    </section>

    <div class="mode-switch" role="tablist" aria-label="Rejim">
      <button class="mode-btn active" type="button" role="tab" aria-selected="true" data-mode="command">Buyruq</button>
      <button class="mode-btn" type="button" role="tab" aria-selected="false" data-mode="claude">Claude</button>
    </div>

    <main id="content">
      <section class="quick-grid" aria-label="Tezkor buyruqlar">
        <button class="quick-action" type="button" data-action="system.status" data-label="Tizim holati">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16v-5M12 16V8M16 16v-3"/></svg>
          <span>Status</span>
        </button>
        <button class="quick-action" type="button" data-action="system.screenshot" data-label="Skrinshot">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v12H4z"/><path d="M9 7l1.5-2h3L15 7"/><circle cx="12" cy="13" r="3"/></svg>
          <span>Skrinshot</span>
        </button>
        <button class="quick-action" type="button" data-action="system.screenshot_window" data-label="Oyna skrinshoti">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4z"/><path d="M4 9h16"/><path d="M8 7h.01M11 7h.01"/></svg>
          <span>Oyna</span>
        </button>
        <button class="quick-action" type="button" data-action="app.open" data-label="VS Code ochish" data-params='{"app_name":"vs code"}'>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3l5 4v10l-5 4-8-6-5 4V5l5 4z"/><path d="M16 3v18"/></svg>
          <span>VS Code</span>
        </button>
        <button class="quick-action" type="button" data-action="system.volume_up" data-label="Ovozni oshirish">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 9v6h4l5 4V5L9 9z"/><path d="M18 9v6M21 12h-6"/></svg>
          <span>Ovoz +</span>
        </button>
        <button class="quick-action" type="button" data-action="system.volume_down" data-label="Ovozni kamaytirish">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 9v6h4l5 4V5L9 9z"/><path d="M19 12h-4"/></svg>
          <span>Ovoz -</span>
        </button>
        <button class="quick-action" type="button" data-action="system.volume_mute" data-label="Mute">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 9v6h4l5 4V5L9 9z"/><path d="M19 9l-4 6M15 9l4 6"/></svg>
          <span>Mute</span>
        </button>
        <button class="quick-action" type="button" data-action="window.desktop" data-label="Desktop">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v11H4z"/><path d="M9 20h6M12 16v4"/></svg>
          <span>Desktop</span>
        </button>
        <button class="quick-action" type="button" data-action="clipboard.copy" data-label="Copy">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 9h10v10H9z"/><path d="M5 15H4V4h11v1"/></svg>
          <span>Copy</span>
        </button>
        <button class="quick-action" type="button" data-action="clipboard.paste" data-label="Paste">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 4h6l1 2h3v14H5V6h3z"/><path d="M9 4h6v4H9z"/></svg>
          <span>Paste</span>
        </button>
        <button class="quick-action" type="button" data-action="app.running_list" data-label="Ochiq ilovalar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></svg>
          <span>Ilovalar</span>
        </button>
        <button class="quick-action danger" type="button" data-action="system.lock" data-label="Ekranni qulflash" data-confirm="true">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 10h12v10H6z"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <span>Lock</span>
        </button>
      </section>

      <section id="history" aria-label="Tarix">
        <div id="empty-state" class="empty-state">
          <strong>GHOST tayyor</strong>
          <span>Buyruq yoki prompt yuboring.</span>
        </div>
      </section>
    </main>

    <footer class="composer">
      <div class="input-box">
        <textarea id="prompt-input" rows="1" placeholder="Buyruq yozing..." autocomplete="off" spellcheck="false" aria-label="Matn"></textarea>
        <button id="btn-send" class="send-btn" type="button" disabled aria-label="Yuborish">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <section id="gate" class="gate" hidden>
    <div class="gate-panel">
      <strong>Telegram sessiya kerak</strong>
      <span id="gate-message">Mini App Telegram ichida ochilishi kerak.</span>
    </div>
  </section>

  <section id="confirm" class="modal" hidden>
    <div class="modal-backdrop" data-close="confirm"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
      <strong id="confirm-title">Tasdiqlash</strong>
      <p id="confirm-text">Buyruqni bajarish tasdiqlansinmi?</p>
      <div class="modal-actions">
        <button id="btn-confirm-cancel" type="button" class="soft-btn">Bekor</button>
        <button id="btn-confirm-ok" type="button" class="danger-btn">Tasdiqlash</button>
      </div>
    </div>
  </section>

  <section id="lightbox" class="lightbox" hidden>
    <div id="lightbox-backdrop" class="modal-backdrop"></div>
    <div class="lightbox-panel" role="dialog" aria-modal="true" aria-label="Skrinshot">
      <div class="lightbox-toolbar">
        <span id="lightbox-label">Skrinshot</span>
        <div>
          <button id="btn-download" class="icon-btn" type="button" aria-label="Yuklab olish" title="Yuklab olish">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
          </button>
          <button id="btn-lb-close" class="icon-btn" type="button" aria-label="Yopish" title="Yopish">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <img id="lightbox-img" alt="Skrinshot" />
    </div>
  </section>

  <div id="toast" role="status" aria-live="polite"></div>
  <script src="/static/app.js" defer></script>
</body>
</html>
